name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  hook:
    name: hook acceptance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run hook acceptance tests
        run: node packages/hook/test/run.mjs

  overlay:
    name: overlay tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/overlay/src-tauri
      # Linux is the only platform that needs extra system libs for the Tauri crate to compile.
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf build-essential libssl-dev libgtk-3-dev
      # Compiles the full Tauri crate + runs unit tests on every OS — catches platform-specific
      # build breakage (rodio/CoreAudio, WebView2, path handling) without needing physical machines.
      - name: cargo test
        run: cargo test --manifest-path packages/overlay/src-tauri/Cargo.toml
