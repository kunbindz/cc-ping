name: release

# Builds the overlay for Windows/macOS/Linux and publishes the hook to npm.
# Trigger by pushing a tag like `v0.1.0`, or run manually.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  overlay:
    name: overlay (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            rust-targets: ""
          - platform: ubuntu-22.04
            args: ""
            rust-targets: ""
          # Universal binary so the .dmg runs on both Apple Silicon and Intel Macs.
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/overlay/src-tauri

      # Tauri 2 Linux system dependencies
      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl wget file libssl-dev libgtk-3-dev

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Build + release overlay
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: packages/overlay
          tagName: ${{ github.ref_name }}
          releaseName: "cc-ping ${{ github.ref_name }}"
          releaseBody: "See the README for install instructions."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  publish-hook:
    name: publish hook to npm
    runs-on: ubuntu-latest
    # Only on a real tag push, not manual dispatch.
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Check npm token
        id: npm-token
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::NPM_TOKEN is not set; skipping hook publish."
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup Node
        if: steps.npm-token.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - name: Publish
        if: steps.npm-token.outputs.present == 'true'
        working-directory: packages/hook
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
