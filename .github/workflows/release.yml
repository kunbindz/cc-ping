name: release

# Builds the overlay for Windows/macOS/Linux and publishes the hook to npm.
# Trigger by pushing a tag like `v0.1.0`, or run manually.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  overlay:
    name: overlay (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest, ubuntu-22.04]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/overlay/src-tauri

      # Tauri 2 Linux system dependencies
      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl wget file libssl-dev libgtk-3-dev

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Build + release overlay
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: packages/overlay
          tagName: ${{ github.ref_name }}
          releaseName: "cc-ping ${{ github.ref_name }}"
          releaseBody: "See the README for install instructions."
          releaseDraft: true
          prerelease: false

  publish-hook:
    name: publish hook to npm
    runs-on: ubuntu-latest
    # Only on a real tag push, not manual dispatch.
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - name: Publish
        working-directory: packages/hook
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
