<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cc-ping</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- The whole window is transparent + click-through. Only the stage paints. -->
    <div id="stage" class="stage" aria-live="polite">
      <div id="bubble" class="bubble">
        <span id="bubble-text"></span>
        <span class="bubble-tail"></span>
      </div>

      <!-- Chef Crab — pixel-art mascot rendered by mascot.js. The extra top room in the
           canvas keeps the chef hat from clipping during the hop. -->
      <canvas id="crab" width="204" height="180"></canvas>
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
