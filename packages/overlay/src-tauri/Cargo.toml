[package]
name = "cc-ping-overlay"
version = "0.2.0"
description = "cc-ping overlay — background mascot + sound notifier for Claude Code"
authors = ["cc-ping contributors"]
edition = "2021"
rust-version = "1.77"

[lib]
name = "cc_ping_overlay_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "cc-ping-overlay"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon", "image-png"] }
tauri-plugin-single-instance = "2"
tauri-plugin-autostart = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tiny_http = "0.12"
rodio = { version = "0.19", default-features = false, features = ["wav"] }
dirs = "5"

[profile.release]
opt-level = "s"
lto = true
strip = true
panic = "abort"
